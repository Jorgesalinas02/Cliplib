services:
  - type: web
    name: cliplib
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    pythonVersion: "3.11"
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: ENVIRONMENT
        value: production
